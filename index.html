<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片转ICO工具 - 抠图 · 恢复 · 转换</title>
<style>
:root {
  --bg-primary: #0f1117;
  --bg-secondary: #1a1d27;
  --bg-tertiary: #252836;
  --bg-hover: #2d3143;
  --text-primary: #e8eaed;
  --text-secondary: #9aa0a6;
  --text-muted: #6b7280;
  --accent: #4f8ff7;
  --accent-hover: #3d7de6;
  --accent-glow: rgba(79, 143, 247, 0.3);
  --success: #34d399;
  --warning: #fbbf24;
  --danger: #f87171;
  --border: #2d3143;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px;
}

/* Header */
.header {
  text-align: center;
  padding: 40px 20px 30px;
  position: relative;
}

.header::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 200px; height: 3px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  border-radius: 2px;
}

.header h1 {
  font-size: 2.2em;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}

.header p {
  color: var(--text-secondary);
  font-size: 1em;
}

/* Upload Area */
.upload-area {
  max-width: 600px;
  margin: 0 auto 30px;
  padding: 60px 30px;
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  text-align: center;
  cursor: pointer;
  transition: all 0.3s ease;
  background: var(--bg-secondary);
  position: relative;
}

.upload-area:hover {
  border-color: var(--accent);
  background: rgba(79, 143, 247, 0.05);
  box-shadow: 0 0 30px var(--accent-glow);
}

.upload-area.dragover {
  border-color: var(--accent);
  background: rgba(79, 143, 247, 0.1);
  transform: scale(1.02);
}

.upload-area.has-image {
  display: none;
}

.upload-icon {
  font-size: 4em;
  margin-bottom: 16px;
  display: block;
}

.upload-text {
  font-size: 1.2em;
  color: var(--text-primary);
  margin-bottom: 8px;
}

.upload-hint {
  color: var(--text-muted);
  font-size: 0.9em;
}

.upload-btn {
  display: inline-block;
  margin-top: 16px;
  padding: 10px 28px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 1em;
  cursor: pointer;
  transition: all 0.2s;
}

.upload-btn:hover {
  background: var(--accent-hover);
  transform: translateY(-2px);
}

/* Editor */
.editor { display: none; }
.editor.active { display: block; }

.editor-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--bg-secondary);
  border-radius: var(--radius);
  margin-bottom: 16px;
  border: 1px solid var(--border);
}

.editor-title {
  font-size: 1.1em;
  font-weight: 600;
  color: var(--text-primary);
}

.btn {
  padding: 8px 18px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 0.9em;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
}

.btn-primary:hover {
  background: var(--accent-hover);
  box-shadow: 0 0 15px var(--accent-glow);
}

.btn-secondary {
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border: 1px solid var(--border);
}

.btn-secondary:hover {
  background: var(--bg-hover);
}

.btn-danger {
  background: rgba(248, 113, 113, 0.15);
  color: var(--danger);
  border: 1px solid rgba(248, 113, 113, 0.3);
}

.btn-danger:hover {
  background: rgba(248, 113, 113, 0.25);
}

.btn-sm { padding: 6px 14px; font-size: 0.85em; }

.editor-main {
  display: grid;
  grid-template-columns: 220px 1fr 280px;
  gap: 16px;
  min-height: 500px;
}

/* Panels */
.panel {
  background: var(--bg-secondary);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
}

.panel-header {
  padding: 14px 16px;
  font-weight: 600;
  font-size: 0.95em;
  color: var(--text-primary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}

.panel-body {
  padding: 16px;
}

/* Tools Panel */
.tools-panel .tool-group {
  margin-bottom: 20px;
}

.tool-group-title {
  font-size: 0.8em;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
}

.tool-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 10px 12px;
  background: transparent;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 0.9em;
  transition: all 0.2s;
  margin-bottom: 4px;
  font-family: inherit;
}

.tool-btn:hover {
  background: var(--bg-tertiary);
  color: var(--text-primary);
}

.tool-btn.active {
  background: rgba(79, 143, 247, 0.15);
  border-color: var(--accent);
  color: var(--accent);
}

.tool-btn .icon {
  font-size: 1.3em;
  width: 28px;
  text-align: center;
}

/* Canvas Area */
.canvas-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  background:
    linear-gradient(45deg, #1a1d27 25%, transparent 25%),
    linear-gradient(-45deg, #1a1d27 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #1a1d27 75%),
    linear-gradient(-45deg, transparent 75%, #1a1d27 75%);
  background-size: 20px 20px;
  background-position: 0 0, 0 10px, 10px -10px, -10px 0;
  background-color: var(--bg-primary);
}

.canvas-wrapper {
  position: relative;
  display: inline-block;
  border-radius: var(--radius-sm);
  overflow: hidden;
  box-shadow: var(--shadow);
}

.canvas-wrapper canvas {
  display: block;
  max-width: 100%;
  max-height: 60vh;
  cursor: crosshair;
}

.canvas-info {
  position: absolute;
  bottom: 8px;
  left: 8px;
  background: rgba(0,0,0,0.7);
  color: var(--text-secondary);
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 0.8em;
  backdrop-filter: blur(8px);
}

.canvas-hint {
  color: var(--text-muted);
  font-size: 0.85em;
  margin-top: 12px;
  text-align: center;
}

/* Settings Panel */
.settings-panel .setting-group {
  margin-bottom: 20px;
}

.setting-group-title {
  font-size: 0.85em;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.setting-row {
  margin-bottom: 12px;
}

.setting-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.85em;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.setting-value {
  color: var(--accent);
  font-weight: 600;
}

/* Range Slider */
input[type="range"] {
  -webkit-appearance: none;
  width: 100%;
  height: 6px;
  border-radius: 3px;
  background: var(--bg-primary);
  outline: none;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  box-shadow: 0 0 8px var(--accent-glow);
  transition: transform 0.15s;
}

input[type="range"]::-webkit-slider-thumb:hover {
  transform: scale(1.2);
}

/* Checkbox */
.checkbox-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  cursor: pointer;
  font-size: 0.9em;
  color: var(--text-secondary);
}

.checkbox-row input[type="checkbox"] {
  accent-color: var(--accent);
  width: 16px; height: 16px;
  cursor: pointer;
}

/* Size Grid */
.size-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.size-btn {
  padding: 8px 4px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 0.8em;
  text-align: center;
  transition: all 0.2s;
  font-family: inherit;
}

.size-btn:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.size-btn.active {
  background: rgba(79, 143, 247, 0.2);
  border-color: var(--accent);
  color: var(--accent);
  font-weight: 600;
}

.custom-size-input {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
}

.custom-size-input input {
  width: 70px;
  padding: 6px 8px;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-primary);
  font-size: 0.85em;
  text-align: center;
}

.custom-size-input span {
  color: var(--text-muted);
  font-size: 0.85em;
}

/* Preview */
.preview-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.preview-sizes {
  display: flex;
  gap: 12px;
  align-items: flex-end;
  flex-wrap: wrap;
  justify-content: center;
}

.preview-item {
  text-align: center;
}

.preview-item canvas {
  border: 1px solid var(--border);
  border-radius: 4px;
  background:
    linear-gradient(45deg, #252836 25%, transparent 25%),
    linear-gradient(-45deg, #252836 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #252836 75%),
    linear-gradient(-45deg, transparent 75%, #252836 75%);
  background-size: 8px 8px;
  background-position: 0 0, 0 4px, 4px -4px, -4px 0;
  background-color: var(--bg-tertiary);
  image-rendering: pixelated;
}

.preview-item .label {
  font-size: 0.75em;
  color: var(--text-muted);
  margin-top: 4px;
}

/* Export Section */
.export-section {
  margin-top: 20px;
  padding: 20px;
  background: var(--bg-secondary);
  border-radius: var(--radius);
  border: 1px solid var(--border);
}

.export-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.export-header h3 {
  font-size: 1.1em;
  color: var(--text-primary);
}

.export-buttons {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

/* Color Picker Indicator */
.color-indicator {
  display: inline-block;
  width: 16px; height: 16px;
  border-radius: 4px;
  border: 2px solid var(--border);
  vertical-align: middle;
  margin-right: 4px;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  padding: 12px 24px;
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border-radius: var(--radius-sm);
  font-size: 0.9em;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
  z-index: 9999;
  transition: transform 0.3s ease;
  pointer-events: none;
}

.toast.show {
  transform: translateX(-50%) translateY(0);
}

.toast.success { border-color: var(--success); }
.toast.error { border-color: var(--danger); }

/* Responsive */
@media (max-width: 1100px) {
  .editor-main {
    grid-template-columns: 1fr;
  }
  .tools-panel {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tools-panel .tool-group {
    margin-bottom: 0;
  }
  .tools-panel .tool-btn {
    width: auto;
  }
}

@media (max-width: 600px) {
  .container { padding: 10px; }
  .header h1 { font-size: 1.5em; }
  .upload-area { padding: 40px 20px; }
  .export-buttons { flex-direction: column; }
  .size-grid { grid-template-columns: 1fr 1fr 1fr; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🖼️ 图片转ICO工具</h1>
    <p>抠图 · 恢复 · 尺寸调整 · ICO转换 — 全部在一个页面完成</p>
  </div>

  <!-- Upload -->
  <div class="upload-area" id="uploadArea">
    <span class="upload-icon">📁</span>
    <div class="upload-text">拖拽图片到这里，或点击选择</div>
    <div class="upload-hint">支持 PNG / JPG / BMP / WebP 格式</div>
    <button class="upload-btn" onclick="fileInput.click()">选择图片</button>
    <input type="file" id="fileInput" accept="image/*" style="display:none">
  </div>

  <!-- Editor -->
  <div class="editor" id="editor">
    <div class="editor-header">
      <span class="editor-title">📝 编辑器</span>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-secondary btn-sm" onclick="undo()">↩ 撤销</button>
        <button class="btn btn-secondary btn-sm" onclick="resetAll()">🔄 重置</button>
        <button class="btn btn-danger btn-sm" onclick="newImage()">📁 换图</button>
      </div>
    </div>

    <div class="editor-main">
      <!-- Tools -->
      <div class="panel tools-panel">
        <div class="panel-header">🛠️ 工具</div>
        <div class="panel-body">
          <div class="tool-group">
            <div class="tool-group-title">抠图工具</div>
            <button class="tool-btn active" id="btnPicker" onclick="setTool('picker')">
              <span class="icon">🎯</span> 点击抠图
            </button>
            <button class="tool-btn" id="btnFlood" onclick="setTool('flood')">
              <span class="icon">🌊</span> 区域抠图
            </button>
          </div>
          <div class="tool-group">
            <div class="tool-group-title">恢复工具</div>
            <button class="tool-btn" id="btnBrush" onclick="setTool('brush')">
              <span class="icon">🖌️</span> 画笔恢复
            </button>
            <button class="tool-btn" id="btnEraser" onclick="setTool('eraser')">
              <span class="icon">🧹</span> 橡皮擦
            </button>
          </div>
          <div class="tool-group">
            <div class="tool-group-title">快捷操作</div>
            <button class="tool-btn" onclick="autoRemoveWhite()">
              <span class="icon">⚡</span> 去白色背景
            </button>
            <button class="tool-btn" onclick="autoRemoveBlack()">
              <span class="icon">🌑</span> 去黑色背景
            </button>
          </div>
        </div>
      </div>

      <!-- Canvas -->
      <div class="panel canvas-area">
        <div class="canvas-wrapper">
          <canvas id="mainCanvas"></canvas>
          <div class="canvas-info" id="canvasInfo"></div>
        </div>
        <div class="canvas-hint" id="canvasHint">点击图片上的背景颜色进行抠图</div>
      </div>

      <!-- Settings -->
      <div class="panel settings-panel">
        <div class="panel-header">⚙️ 设置</div>
        <div class="panel-body">

          <!-- Background Removal Settings -->
          <div class="setting-group">
            <div class="setting-group-title">✂️ 抠图设置</div>
            <div class="setting-row">
              <div class="setting-label">
                <span>容差</span>
                <span class="setting-value" id="toleranceVal">30</span>
              </div>
              <input type="range" id="tolerance" min="1" max="100" value="30"
                oninput="document.getElementById('toleranceVal').textContent=this.value">
            </div>
            <div class="setting-row">
              <label class="checkbox-row">
                <input type="checkbox" id="edgeSmooth" checked>
                边缘平滑
              </label>
            </div>
          </div>

          <!-- Brush Settings -->
          <div class="setting-group">
            <div class="setting-group-title">🖌️ 画笔设置</div>
            <div class="setting-row">
              <div class="setting-label">
                <span>大小</span>
                <span class="setting-value" id="brushSizeVal">20</span>px
              </div>
              <input type="range" id="brushSize" min="1" max="100" value="20"
                oninput="document.getElementById('brushSizeVal').textContent=this.value">
            </div>
            <div class="setting-row">
              <div class="setting-label">
                <span>硬度</span>
                <span class="setting-value" id="brushHardVal">80</span>%
              </div>
              <input type="range" id="brushHardness" min="10" max="100" value="80"
                oninput="document.getElementById('brushHardVal').textContent=this.value">
            </div>
          </div>

          <!-- Size Settings -->
          <div class="setting-group">
            <div class="setting-group-title">📐 图标尺寸</div>
            <div class="size-grid">
              <button class="size-btn" onclick="setSize(16)" data-size="16">16×16</button>
              <button class="size-btn" onclick="setSize(32)" data-size="32">32×32</button>
              <button class="size-btn active" onclick="setSize(64)" data-size="64">64×64</button>
              <button class="size-btn" onclick="setSize(128)" data-size="128">128×128</button>
              <button class="size-btn" onclick="setSize(256)" data-size="256">256×256</button>
              <button class="size-btn" id="customSizeBtn" onclick="toggleCustomSize()">自定义</button>
            </div>
            <div class="custom-size-input" id="customSizeInput" style="display:none">
              <input type="number" id="customW" value="48" min="1" max="512" onchange="applyCustomSize()">
              <span>×</span>
              <input type="number" id="customH" value="48" min="1" max="512" onchange="applyCustomSize()">
              <span>px</span>
            </div>
          </div>

          <!-- Preview -->
          <div class="setting-group">
            <div class="setting-group-title">👁️ 预览</div>
            <div class="preview-area">
              <div class="preview-sizes" id="previewArea"></div>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- Export -->
    <div class="export-section">
      <div class="export-header">
        <h3>💾 导出</h3>
        <div class="export-buttons">
          <button class="btn btn-secondary" onclick="exportPNG()">导出 PNG</button>
          <button class="btn btn-primary" onclick="exportICO()">📥 导出 ICO</button>
        </div>
      </div>
      <div style="font-size:0.85em;color:var(--text-muted);">
        ICO文件支持嵌入多种尺寸，选择你需要的尺寸后导出即可。
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Hidden Canvases -->
<canvas id="originalCanvas" style="display:none"></canvas>
<canvas id="tempCanvas" style="display:none"></canvas>

<script>
// ===== STATE =====
const state = {
  tool: 'picker',
  currentSize: 64,
  customSize: { w: 48, h: 48 },
  brushDown: false,
  history: [],
  maxHistory: 30,
  pickedColor: null,
  originalImageData: null,
};

// ===== ELEMENTS =====
const $ = id => document.getElementById(id);
const mainCanvas = $('mainCanvas');
const mainCtx = mainCanvas.getContext('2d', { willReadFrequently: true });
const originalCanvas = $('originalCanvas');
const originalCtx = originalCanvas.getContext('2d', { willReadFrequently: true });
const tempCanvas = $('tempCanvas');
const tempCtx = tempCanvas.getContext('2d', { willReadFrequently: true });

// ===== TOAST =====
function toast(msg, type = '') {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.className = 'toast', 2500);
}

// ===== FILE UPLOAD =====
const uploadArea = $('uploadArea');
const fileInput = $('fileInput');

uploadArea.addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') fileInput.click();
});

uploadArea.addEventListener('dragover', e => {
  e.preventDefault();
  uploadArea.classList.add('dragover');
});

uploadArea.addEventListener('dragleave', () => {
  uploadArea.classList.remove('dragover');
});

uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadImage(file);
});

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) loadImage(e.target.files[0]);
});

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      // Set canvases
      mainCanvas.width = img.width;
      mainCanvas.height = img.height;
      originalCanvas.width = img.width;
      originalCanvas.height = img.height;

      mainCtx.drawImage(img, 0, 0);
      originalCtx.drawImage(img, 0, 0);

      // Store original data
      state.originalImageData = originalCtx.getImageData(0, 0, img.width, img.height);
      state.history = [];

      // Show editor
      uploadArea.classList.add('has-image');
      $('editor').classList.add('active');

      // Update info
      $('canvasInfo').textContent = `${img.width} × ${img.height}px`;

      // Save to temp
      tempCanvas.width = img.width;
      tempCanvas.height = img.height;

      updatePreview();
      toast('图片已加载 ✓', 'success');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ===== TOOLS =====
function setTool(tool) {
  state.tool = tool;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  const btn = $('btn' + tool.charAt(0).toUpperCase() + tool.slice(1));
  if (btn) btn.classList.add('active');

  // Update cursor
  if (tool === 'brush' || tool === 'eraser') {
    mainCanvas.style.cursor = 'none';
    $('canvasHint').textContent = '按住鼠标左键涂抹，恢复或擦除图像区域';
  } else if (tool === 'picker') {
    mainCanvas.style.cursor = 'crosshair';
    $('canvasHint').textContent = '点击图片上的颜色，相似颜色区域将被移除';
  } else if (tool === 'flood') {
    mainCanvas.style.cursor = 'crosshair';
    $('canvasHint').textContent = '点击一个区域，相连的相似颜色将被移除';
  }
}

// ===== HISTORY =====
function saveHistory() {
  const data = mainCtx.getImageData(0, 0, mainCanvas.width, mainCanvas.height);
  state.history.push(data);
  if (state.history.length > state.maxHistory) state.history.shift();
}

function undo() {
  if (state.history.length === 0) {
    toast('没有可撤销的操作', 'error');
    return;
  }
  mainCtx.putImageData(state.history.pop(), 0, 0);
  updatePreview();
  toast('已撤销');
}

// ===== COLOR UTILS =====
function colorDist(c1, c2) {
  const dr = c1[0] - c2[0];
  const dg = c1[1] - c2[1];
  const db = c1[2] - c2[2];
  return Math.sqrt(dr * dr + dg * dg + db * db);
}

// ===== BACKGROUND REMOVAL =====
function removeByColor(targetColor, tolerance) {
  saveHistory();
  const imageData = mainCtx.getImageData(0, 0, mainCanvas.width, mainCanvas.height);
  const data = imageData.data;
  const smooth = $('edgeSmooth').checked;

  for (let i = 0; i < data.length; i += 4) {
    const pixel = [data[i], data[i+1], data[i+2]];
    const dist = colorDist(pixel, targetColor);
    if (dist <= tolerance) {
      data[i+3] = 0; // Make transparent
    } else if (smooth && dist <= tolerance * 1.5) {
      // Edge smoothing - semi-transparent
      const alpha = Math.round(255 * (dist - tolerance) / (tolerance * 0.5));
      data[i+3] = Math.min(data[i+3], alpha);
    }
  }

  mainCtx.putImageData(imageData, 0, 0);
  updatePreview();
}

function floodRemove(startX, startY, tolerance) {
  saveHistory();
  const w = mainCanvas.width;
  const h = mainCanvas.height;
  const imageData = mainCtx.getImageData(0, 0, w, h);
  const data = imageData.data;
  const smooth = $('edgeSmooth').checked;

  const startIdx = (startY * w + startX) * 4;
  const targetColor = [data[startIdx], data[startIdx+1], data[startIdx+2]];

  const visited = new Uint8Array(w * h);
  const stack = [startX, startY];

  while (stack.length > 0) {
    const y = stack.pop();
    const x = stack.pop();

    if (x < 0 || x >= w || y < 0 || y >= h) continue;
    const idx = y * w + x;
    if (visited[idx]) continue;
    visited[idx] = 1;

    const pi = idx * 4;
    const pixel = [data[pi], data[pi+1], data[pi+2]];
    const dist = colorDist(pixel, targetColor);

    if (dist > tolerance) continue;

    data[pi+3] = 0;

    stack.push(x-1, y);
    stack.push(x+1, y);
    stack.push(x, y-1);
    stack.push(x, y+1);
  }

  // Edge smoothing
  if (smooth) {
    for (let i = 0; i < data.length; i += 4) {
      if (data[i+3] > 0 && data[i+3] < 255) continue;
      const px = (i/4) % w;
      const py = Math.floor((i/4) / w);
      let hasTransparent = false;
      for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
          const nx = px + dx, ny = py + dy;
          if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
            const ni = (ny * w + nx) * 4;
            if (data[ni+3] === 0) hasTransparent = true;
          }
        }
      }
      if (hasTransparent && data[i+3] > 200) {
        data[i+3] = 180;
      }
    }
  }

  mainCtx.putImageData(imageData, 0, 0);
  updatePreview();
}

function autoRemoveWhite() {
  removeByColor([255, 255, 255], 50);
  toast('已去除白色背景 ✓', 'success');
}

function autoRemoveBlack() {
  removeByColor([0, 0, 0], 50);
  toast('已去除黑色背景 ✓', 'success');
}

// ===== BRUSH =====
function brushStroke(x, y, isEraser) {
  const size = parseInt($('brushSize').value);
  const hardness = parseInt($('brushHardness').value) / 100;
  const radius = size / 2;

  if (isEraser) {
    // Erase to transparent
    mainCtx.save();
    mainCtx.globalCompositeOperation = 'destination-out';
    const gradient = mainCtx.createRadialGradient(x, y, 0, x, y, radius);
    gradient.addColorStop(0, `rgba(0,0,0,${hardness})`);
    gradient.addColorStop(1, 'rgba(0,0,0,0)');
    mainCtx.fillStyle = gradient;
    mainCtx.beginPath();
    mainCtx.arc(x, y, radius, 0, Math.PI * 2);
    mainCtx.fill();
    mainCtx.restore();
  } else {
    // Restore from original
    const r = Math.ceil(radius);
    const sx = Math.max(0, x - r);
    const sy = Math.max(0, y - r);
    const sw = Math.min(mainCanvas.width - sx, r * 2);
    const sh = Math.min(mainCanvas.height - sy, r * 2);

    // Get original data
    const origData = originalCtx.getImageData(sx, sy, sw, sh);

    // Apply with soft brush
    const currentData = mainCtx.getImageData(sx, sy, sw, sh);
    for (let py = 0; py < sh; py++) {
      for (let px = 0; px < sw; px++) {
        const dx = (sx + px) - x;
        const dy = (sy + py) - y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > radius) continue;

        const falloff = 1 - (dist / radius);
        const strength = falloff >= hardness ? 1 : falloff / hardness;

        const idx = (py * sw + px) * 4;
        currentData.data[idx] = Math.round(currentData.data[idx] + (origData.data[idx] - currentData.data[idx]) * strength);
        currentData.data[idx+1] = Math.round(currentData.data[idx+1] + (origData.data[idx+1] - currentData.data[idx+1]) * strength);
        currentData.data[idx+2] = Math.round(currentData.data[idx+2] + (origData.data[idx+2] - currentData.data[idx+2]) * strength);
        currentData.data[idx+3] = Math.round(currentData.data[idx+3] + (origData.data[idx+3] - currentData.data[idx+3]) * strength);
      }
    }
    mainCtx.putImageData(currentData, sx, sy);
  }
}

// ===== CANVAS EVENTS =====
function getCanvasPos(e) {
  const rect = mainCanvas.getBoundingClientRect();
  const scaleX = mainCanvas.width / rect.width;
  const scaleY = mainCanvas.height / rect.height;
  return {
    x: Math.round((e.clientX - rect.left) * scaleX),
    y: Math.round((e.clientY - rect.top) * scaleY)
  };
}

mainCanvas.addEventListener('mousedown', e => {
  e.preventDefault();
  const pos = getCanvasPos(e);

  if (state.tool === 'picker') {
    const pixel = mainCtx.getImageData(pos.x, pos.y, 1, 1).data;
    state.pickedColor = [pixel[0], pixel[1], pixel[2]];
    removeByColor(state.pickedColor, parseInt($('tolerance').value));
    toast(`已移除颜色 rgb(${pixel[0]},${pixel[1]},${pixel[2]}) ✓`);
  } else if (state.tool === 'flood') {
    floodRemove(pos.x, pos.y, parseInt($('tolerance').value));
    toast('区域抠图完成 ✓');
  } else if (state.tool === 'brush' || state.tool === 'eraser') {
    state.brushDown = true;
    saveHistory();
    brushStroke(pos.x, pos.y, state.tool === 'eraser');
  }
});

mainCanvas.addEventListener('mousemove', e => {
  const pos = getCanvasPos(e);
  $('canvasInfo').textContent = `${pos.x}, ${pos.y} | ${mainCanvas.width}×${mainCanvas.height}`;

  if (state.brushDown && (state.tool === 'brush' || state.tool === 'eraser')) {
    brushStroke(pos.x, pos.y, state.tool === 'eraser');
  }

  // Brush cursor
  if (state.tool === 'brush' || state.tool === 'eraser') {
    const bs = parseInt($('brushSize').value);
    const rect = mainCanvas.getBoundingClientRect();
    const dispSize = bs * (rect.width / mainCanvas.width);
    mainCanvas.style.cursor = `none`;
  }
});

mainCanvas.addEventListener('mouseup', () => {
  if (state.brushDown) {
    state.brushDown = false;
    updatePreview();
  }
});

mainCanvas.addEventListener('mouseleave', () => {
  state.brushDown = false;
});

// ===== SIZE =====
function setSize(size) {
  state.currentSize = size;
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`[data-size="${size}"]`);
  if (btn) btn.classList.add('active');
  $('customSizeInput').style.display = 'none';
  updatePreview();
}

function toggleCustomSize() {
  const input = $('customSizeInput');
  if (input.style.display === 'none') {
    input.style.display = 'flex';
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
    $('customSizeBtn').classList.add('active');
    applyCustomSize();
  } else {
    input.style.display = 'none';
    setSize(64);
  }
}

function applyCustomSize() {
  const w = parseInt($('customW').value) || 48;
  const h = parseInt($('customH').value) || 48;
  state.currentSize = null;
  state.customSize = { w: Math.min(512, Math.max(1, w)), h: Math.min(512, Math.max(1, h)) };
  updatePreview();
}

// ===== PREVIEW =====
function updatePreview() {
  const area = $('previewArea');
  area.innerHTML = '';

  const sizes = state.currentSize
    ? [{ w: state.currentSize, h: state.currentSize }]
    : [state.customSize];

  // Also show a few standard sizes for reference
  const refSizes = [16, 32, 64];
  refSizes.forEach(s => {
    if (!sizes.find(sz => sz.w === s && sz.h === s)) {
      sizes.push({ w: s, h: s });
    }
  });

  sizes.forEach(({ w, h }) => {
    const item = document.createElement('div');
    item.className = 'preview-item';

    const canvas = document.createElement('canvas');
    canvas.width = w;
    canvas.height = h;
    // Display at a reasonable size
    const displaySize = Math.max(32, Math.min(64, w));
    canvas.style.width = displaySize + 'px';
    canvas.style.height = displaySize + 'px';

    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(mainCanvas, 0, 0, w, h);

    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = `${w}×${h}`;

    item.appendChild(canvas);
    item.appendChild(label);
    area.appendChild(item);
  });
}

// ===== EXPORT =====
function getExportCanvas(targetW, targetH) {
  const canvas = document.createElement('canvas');
  canvas.width = targetW;
  canvas.height = targetH;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(mainCanvas, 0, 0, targetW, targetH);
  return canvas;
}

function exportPNG() {
  const size = state.currentSize || state.customSize.w;
  const canvas = getExportCanvas(size, state.currentSize ? state.currentSize : state.customSize.h);
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `icon_${size}x${size}.png`;
    a.click();
    URL.revokeObjectURL(url);
    toast('PNG 导出成功 ✓', 'success');
  }, 'image/png');
}

function exportICO() {
  const sizes = [];

  if (state.currentSize) {
    sizes.push({ w: state.currentSize, h: state.currentSize });
  } else {
    sizes.push(state.customSize);
  }

  // Build ICO
  buildICO(sizes).then(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `icon_${sizes[0].w}x${sizes[0].h}.ico`;
    a.click();
    URL.revokeObjectURL(url);
    toast('ICO 导出成功 ✓', 'success');
  });
}

async function buildICO(sizes) {
  const pngBuffers = [];

  for (const { w, h } of sizes) {
    const canvas = getExportCanvas(w, h);
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    const buffer = await blob.arrayBuffer();
    pngBuffers.push(new Uint8Array(buffer));
  }

  // ICO Header: 6 bytes
  // ICO Directory: 16 bytes per image
  // Image data: variable
  const headerSize = 6;
  const dirSize = 16 * pngBuffers.length;
  let dataOffset = headerSize + dirSize;

  // Calculate total size
  let totalSize = headerSize + dirSize;
  pngBuffers.forEach(buf => totalSize += buf.length);

  const buffer = new ArrayBuffer(totalSize);
  const view = new DataView(buffer);
  const bytes = new Uint8Array(buffer);

  // Header
  view.setUint16(0, 0, true);         // Reserved
  view.setUint16(2, 1, true);         // Type: ICO
  view.setUint16(4, pngBuffers.length, true); // Count

  // Directory entries
  let offset = dataOffset;
  for (let i = 0; i < pngBuffers.length; i++) {
    const { w, h } = sizes[i];
    const dirOffset = headerSize + i * 16;
    const pngBuf = pngBuffers[i];

    view.setUint8(dirOffset, w >= 256 ? 0 : w);      // Width
    view.setUint8(dirOffset + 1, h >= 256 ? 0 : h);  // Height
    view.setUint8(dirOffset + 2, 0);                   // Color palette
    view.setUint8(dirOffset + 3, 0);                   // Reserved
    view.setUint16(dirOffset + 4, 1, true);            // Color planes
    view.setUint16(dirOffset + 6, 32, true);           // Bits per pixel
    view.setUint32(dirOffset + 8, pngBuf.length, true); // Data size
    view.setUint32(dirOffset + 12, offset, true);      // Data offset

    // Copy PNG data
    bytes.set(pngBuf, offset);
    offset += pngBuf.length;
  }

  return new Blob([buffer], { type: 'image/x-icon' });
}

// ===== RESET =====
function resetAll() {
  if (!state.originalImageData) return;
  saveHistory();
  mainCtx.putImageData(state.originalImageData, 0, 0);
  updatePreview();
  toast('已重置为原图');
}

function newImage() {
  $('editor').classList.remove('active');
  uploadArea.classList.remove('has-image');
  fileInput.value = '';
  state.history = [];
  state.originalImageData = null;
}

// ===== INIT =====
setTool('picker');
</script>
